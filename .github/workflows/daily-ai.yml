name: Daily AI Trending

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  send-trending:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch GitHub AI Trending and Send to Feishu
        env:
          WH: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          pip install requests beautifulsoup4 -q
          
          python3 << 'EOF'
          import requests, json, os
          from datetime import datetime
          from bs4 import BeautifulSoup
          
          # 抓取 GitHub Trending
          headers = {"User-Agent": "Mozilla/5.0"}
          res = requests.get("https://github.com/trending?since=daily", headers=headers)
          soup = BeautifulSoup(res.text, "html.parser")
          
          repos = []
          for item in soup.select("article.Box-row")[:15]:
              name = item.select_one("h2 a")
              desc = item.select_one("p")
              stars = item.select_one("span.d-inline-block.float-sm-right")
              if name:
                  repo_name = name.get_text(strip=True).replace("\n","").replace(" ","")
                  repo_desc = desc.get_text(strip=True) if desc else "暂无描述"
                  repo_stars = stars.get_text(strip=True) if stars else ""
                  repos.append(f"{repo_name} | {repo_stars}\n{repo_desc}")
          
          date = datetime.now().strftime("%Y-%m-%d")
          msg = f"GitHub Trending {date}\n\n" + "\n\n".join([f"{i+1}. {r}" for i,r in enumerate(repos)])
          
          webhook = os.environ["WH"]
          payload = {"msg_type": "text", "content": {"text": msg}}
          r = requests.post(webhook, json=payload)
          print(r.text)
          EOF
