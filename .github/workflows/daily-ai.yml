name: Daily AI Trending

on:
  schedule:
    - cron: '0 23 * * *'  # 北京时间早上7点
  workflow_dispatch:

jobs:
  send-trending:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch GitHub AI Trending and Send to Feishu
        env:
          WH: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          pip install requests beautifulsoup4 deep-translator -q
          
          python3 << 'EOF'
          import requests, os, json
          from datetime import datetime
          from bs4 import BeautifulSoup
          from deep_translator import GoogleTranslator
          
          headers = {"User-Agent": "Mozilla/5.0"}
          res = requests.get("https://github.com/trending?since=daily", headers=headers)
          soup = BeautifulSoup(res.text, "html.parser")
          
          translator = GoogleTranslator(source='en', target='zh-CN')
          
          repos = []
          for item in soup.select("article.Box-row")[:10]:
              name = item.select_one("h2 a")
              desc = item.select_one("p")
              stars = item.select_one("span.d-inline-block.float-sm-right")
              if name:
                  repo_name = name.get_text(strip=True).replace("\n","").replace(" ","")
                  repo_desc = desc.get_text(strip=True) if desc else "暂无描述"
                  repo_stars = stars.get_text(strip=True) if stars else "N/A"
                  try:
                      repo_desc_cn = translator.translate(repo_desc)
                  except:
                      repo_desc_cn = repo_desc
                  repos.append((repo_name, repo_desc_cn, repo_stars))
          
          date = datetime.now().strftime("%Y-%m-%d")
          
          # 构建飞书卡片
          elements = [
              {
                  "tag": "div",
                  "text": {
                      "tag": "lark_md",
                      "content": f"📅 {date} | 每日自动推送"
                  }
              },
              {"tag": "hr"}
          ]
          
          for i, (name, desc, stars) in enumerate(repos):
              elements.append({
                  "tag": "div",
                  "text": {
                      "tag": "lark_md",
                      "content": f"**{i+1}. [{name}](https://github.com/{name})**\n{desc}\n⭐ {stars}"
                  }
              })
              elements.append({"tag": "hr"})
          
          card = {
              "msg_type": "interactive",
              "card": {
                  "header": {
                      "title": {
                          "tag": "plain_text",
                          "content": "🔥 GitHub Trending 今日热榜"
                      },
                      "template": "red"
                  },
                  "elements": elements
              }
          }
          
          webhook = os.environ["WH"]
          r = requests.post(webhook, json=card)
          print(r.text)
          EOF
